services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pokemon123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pokemon_db}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-pokemon123}
      DB_NAME: ${DB_NAME:-pokemon_db}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
