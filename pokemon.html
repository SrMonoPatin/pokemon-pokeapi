<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <main class="detail">
    <a href="index.html" class="back-link">&larr; Back</a>
    <div id="pokemon-content">
      <div id="loading">Loading...</div>
      <div id="error" class="hidden"></div>
      <div id="pokemon-detail" class="hidden">
        <h1 id="pokemon-name"></h1>
        <div id="pokemon-types" class="types"></div>
        <img id="pokemon-sprite" alt="" class="sprite">
        <p id="pokemon-description" class="description"></p>
        <table id="pokemon-stats" class="stats-table">
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="pokemon.js"></script>
</body>
</html>
